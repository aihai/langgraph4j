name: Deploy New Version

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name:  deploy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: GPG Setup
        env:
          GPG_KEY_BASE64: ${{ secrets.GPG_KEY_BASE64 }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gpg-setup.sh
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '17'
          java-package: jdk
      - name: Deploy to OSS Sonatype
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN  }}
          OSS_SONATYPE_TOKEN: ${{ secrets.OSS_SONATYPE_TOKEN }}
        run: mvn -B -Prelease source:jar javadoc:jar install central-publishing:publish --file pom.xml -s settings-template.xml -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-targets
          path: '**/target/**'
          if-no-files-found: warn
          retention-days: 1
  deploy-javelit:
    runs-on: ubuntu-latest
    name: deploy javelit
    needs: deploy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: GPG Setup
        env:
          GPG_KEY_BASE64: ${{ secrets.GPG_KEY_BASE64 }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gpg-setup.sh
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '22'
          java-package: jdk
      - name: Deploy javelit to OSS Sonatype
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN  }}
          OSS_SONATYPE_TOKEN: ${{ secrets.OSS_SONATYPE_TOKEN }}
        run: mvn -B -Prelease source:jar javadoc:jar install central-publishing:publish -pl javelit --file pom.xml -s settings-template.xml -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
      - name: Upload javelit build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-javelit-targets
          path: '**/target/**'
          if-no-files-found: warn
          retention-days: 1
